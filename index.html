<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Conversor de Temperatura</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Conversor de Temperatura</h1>
  <input type="name" value="Digite a temperatura">
  <br><br>
  <select class="escolha">
    <option>Fahrenheit → Celsius</option>
    <option>Celsius → Fahrenheit</option>
  </select>

  <br><br>

  <button class="converter()">Converter</button>

  <p class="resposta"></p>

  <script src="script.js"></script>
</body>
</html>
